<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Tugas Baru - EduTrack.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f0f5fa] min-h-screen text-slate-800 flex flex-col">

    <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <img src="assets/image/edutrack_logo.png" alt="Logo Edutrack" class="h-8 w-auto object-contain">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-black leading-tight">Dashboard Guru</h1>
                <p class="text-xs text-gray-500 font-medium">Ibu Sarah Reeyn S.Pd</p>
            </div>
        </div>
        <button class="flex items-center space-x-2 text-black font-semibold hover:text-red-600 transition">
            <i class="fa-solid fa-right-from-bracket text-lg"></i>
            <span>Keluar</span>
        </button>
    </header>

    <div class="flex flex-1">
        
        <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col justify-between hidden md:flex">
            <div class="space-y-8">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-slate-100 rounded-md border border-gray-200 flex items-center justify-center text-xs font-bold text-emerald-700">
                        <i class="fa-solid fa-school"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-slate-800">SMA Nusantara</h3>
                        <p class="text-[10px] text-gray-400">Academic Portal</p>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-full text-slate-500 hover:bg-gray-50 text-xs font-semibold transition">
                        <i class="fa-solid fa-table-columns text-sm"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-full bg-indigo-50 text-indigo-600 text-xs font-semibold transition">
                        <i class="fa-solid fa-file-lines text-sm"></i>
                        <span>Tugas</span>
                    </a>
                </nav>
            </div>

            <div class="space-y-4">
                <div class="flex items-center space-x-3 bg-slate-50 p-3 rounded-xl border border-gray-100">
                    <div class="w-10 h-10 bg-[#74b9ff] text-white rounded-full flex items-center justify-center text-lg">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-800">Welcome!</p>
                        <p class="text-[10px] text-gray-500 truncate max-w-[120px]">Ibu Sarah Reeyn S.Pd</p>
                    </div>
                </div>

                <button class="w-full flex items-center justify-center space-x-2 border border-gray-200 hover:bg-gray-50 text-indigo-600 py-2 rounded-xl text-xs font-semibold transition shadow-sm bg-white">
                    <span>Bantuan Teknis</span>
                    <i class="fa-regular fa-comments"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-8">
            
            <div class="bg-white p-6 lg:p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-5xl mx-auto">
                
                <div class="flex items-center space-x-4 mb-6">
                    <a href="#" class="text-black hover:text-gray-600 transition">
                        <i class="fa-solid fa-caret-left text-2xl"></i>
                    </a>
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center text-sm">
                            <i class="fa-solid fa-file-signature"></i>
                        </div>
                        <h2 class="text-base font-bold text-black tracking-tight">Buat Tugas Baru</h2>
                    </div>
                </div>

                <form action="#" method="POST" class="space-y-5">
                    
                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Judul Tugas</label>
                        <input type="text" placeholder="Masukkan judul tugas" 
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-400 rounded-xl text-xs placeholder-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 transition">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Deskripsi</label>
                        <textarea rows="5" placeholder="Jelaskan detail tugas" 
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-400 rounded-xl text-xs placeholder-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 transition resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Mata Pelajaran</label>
                        <div class="relative">
                            <select class="w-full px-4 py-2.5 bg-gray-50 border border-gray-400 rounded-xl text-xs text-gray-500 focus:outline-none focus:bg-white focus:border-blue-500 transition appearance-none">
                                <option value="informatika">Informatika</option>
                                <option value="bahasa_inggris">Bahasa Inggris</option>
                                <option value="matematika">Matematika</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-black">
                                <i class="fa-solid fa-caret-down text-base"></i>
                            </div>
                        </div>
                        <p class="text-[10px] text-gray-300 mt-1 font-medium tracking-wide">Anda hanya dapat membuat tugas untuk mata pelajaran yang anda ajar.</p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Kelas</label>
                        <div class="relative">
                            <select class="w-full px-4 py-2.5 bg-gray-50 border border-gray-400 rounded-xl text-xs text-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 transition appearance-none">
                                <option value="" disabled selected>Pilih Kelas</option>
                                <option value="10-A">10-A</option>
                                <option value="10-B">10-B</option>
                                <option value="11-A">11-A</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                                <i class="fa-solid fa-caret-down text-base"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Deadline</label>
                        <div class="relative">
                            <input type="text" placeholder="DD/MM/TTTT" onfocus="(this.type='date')" onblur="(this.type='text')"
                                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-400 rounded-xl text-xs text-gray-500 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 transition appearance-none">
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-black mb-2">Upload File Soal (Opsional)</label>
                        <label class="border-2 border-dashed border-gray-400 hover:border-blue-400 rounded-xl p-6 flex flex-col items-center justify-center cursor-pointer transition bg-gray-50/50">
                            <input type="file" class="hidden">
                            <i class="fa-solid fa-upload text-gray-500 text-lg"></i>
                        </label>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <button type="button" 
                            class="w-full bg-white hover:bg-gray-50 text-black font-bold py-2.5 px-4 rounded-xl border border-gray-400 text-xs transition shadow-sm text-center">
                            Batal
                        </button>
                        <button type="submit" 
                            class="w-full bg-[#74b9ff] hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded-xl border border-blue-300/30 text-xs transition shadow-sm text-center">
                            Buat Tugas
                        </button>
                    </div>

                </form>

            </div>

        </main>
    </div>
<script src="edutrack.js"></script>
</body>
</html>
