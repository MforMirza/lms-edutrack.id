<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduTrack.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f5f9fc] min-h-screen flex items-center justify-center p-4 lg:p-8">

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
        
        <div class="lg:col-span-6 flex flex-col justify-center px-4">
            <p class="text-base font-bold text-slate-900 leading-snug mb-2 max-w-md">
                Permudah interaksi belajar & mengajar kamu secara Online.
            </p>
            
            <div class="relative flex justify-center items-center w-full max-w-lg mx-auto">
                <img src="assets/image/login.png" alt="Ilustrasi EduTrack" class="w-full h-auto object-contain">
            </div>
        </div>

        <div class="lg:col-span-6 flex justify-center lg:justify-end">
            <div class="bg-white p-8 lg:p-12 rounded-3xl shadow-sm border border-gray-100 w-full max-w-md">
                
                <div class="flex items-center space-x-2 mb-8">
                    <img src="assets/image/edutrack_logo.png" alt="EduTrack Logo" class="h-8 w-auto object-contain">
                    <span class="text-xl font-bold text-[#2d98da]">EduTrack<span class="text-slate-600">.id</span></span>
                </div>

                <h2 class="text-2xl font-bold text-black mb-6">Login</h2>

                <form action="#" method="POST" class="space-y-4">
                    
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1.5">Alamat Email</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-900">
                                <i class="fa-regular fa-envelope"></i>
                            </span>
                            <input type="email" placeholder="Contoh: email@example.com" 
                                class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-800 rounded-full text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1.5">Kata Sandi</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-900">
                                <i class="fa-solid fa-key"></i>
                            </span>
                            <input type="password" placeholder="Masukkan kata sandi" 
                                class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-800 rounded-full text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 transition">
                        </div>
                    </div>

                    <div class="text-right">
                        <a href="#" class="text-xs font-bold text-slate-900 underline hover:text-blue-600 transition">
                            Lupa Kata Sandi
                        </a>
                    </div>

                    <div class="pt-2">
                        <button type="submit" 
                            class="w-full bg-[#74b9ff] hover:bg-[#0984e3] text-white font-semibold py-3 px-4 rounded-full border border-slate-800/20 shadow-inner transition duration-200">
                            Masuk
                        </button>
                    </div>
                </form>

                <div class="mt-8 text-center space-y-4">
                    <p class="text-xs text-slate-800">
                        Belum punya akun? 
                        <a href="#" class="font-bold underline hover:text-blue-600 transition ml-1">
                            Klik disini untuk daftar
                        </a>
                    </p>
                    
                    <p class="text-[10px] text-gray-400 leading-relaxed max-w-xs mx-auto">
                        Dengan menggunakan layanan kami, Anda berarti setuju atas <a href="#" class="underline">Syarat & Ketentuan</a> dan <a href="#" class="underline">Kebijakan Privasi</a> EduTrack.id
                    </p>
                </div>

            </div>
        </div>

    </div>
<script src="edutrack.js"></script>
</body>
</html>
